name: Daily Luma Scrape

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  validate:
    name: Validar conectividad (--dry-run)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dry-run
        run: python scraper.py --dry-run

  scrape:
    name: Ejecutar scraper diario
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run scraper
        run: python scraper.py

      - name: Commit state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f seen_events.json events_master.csv new_events_*.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No hay cambios en archivos de estado"
          else
            git commit -m "chore: actualizar estado del scraper $(date -u +%Y-%m-%d)"
            git push
          fi
